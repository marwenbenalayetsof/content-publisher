<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Content Publisher{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <!-- Sidebar Navigation -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <i class="fas fa-broadcast-tower"></i>
            <span>ContentHub</span>
        </div>
        <nav class="sidebar-nav">
            <a href="/" class="nav-item {% if request.path == '/' %}active{% endif %}">
                <i class="fas fa-microphone-alt"></i>
                <span>Voice Studio</span>
            </a>
            <a href="/publish" class="nav-item {% if request.path == '/publish' %}active{% endif %}">
                <i class="fas fa-video"></i>
                <span>Publish Video</span>
            </a>
            <a href="/accounts" class="nav-item {% if request.path == '/accounts' %}active{% endif %}">
                <i class="fas fa-plug"></i>
                <span>Accounts</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="version-info">v1.0.0</div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Bar -->
        <header class="topbar">
            <div class="topbar-left">
                <h1 class="page-title">{% block page_title %}{% endblock %}</h1>
                <p class="page-subtitle">{% block page_subtitle %}{% endblock %}</p>
            </div>
            <div class="topbar-right">
                <div class="status-indicator" id="statusIndicator">
                    <span class="status-dot"></span>
                    <span>Ready</span>
                </div>
            </div>
        </header>

        <!-- Page Content -->
        <div class="content-area">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- Toast Notifications -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <p class="loading-text" id="loadingText">Processing...</p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
